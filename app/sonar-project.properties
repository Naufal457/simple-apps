# must be unique in a given SonarQube instance
sonar.projectKey=simple-apps1

# --- optional properties ---

# defaults to project key
sonar.projectName=simple-apps1
# defaults to 'not provided'
sonar.projectVersion=1.0

# Path is reative to the sonar-project.properties file. Defaults to .
sonar.sources=.

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Mengabaikan file yang akan discanning
sonarExclusions=coverage/*, node_modules/, testing/*, Dockerfile

# folder testing untuk unit test
sonar.test= testing/

# Laporan unit test
sonar.javascript.lcov.reportPaths=coverage/lcov.info